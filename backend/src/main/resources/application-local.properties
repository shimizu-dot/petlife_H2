# Local-only overrides for contact mail and other sensitive settings.
# This file is ignored by Git. Put real SMTP credentials here or map them from local env vars.

# SMTP for actual outbound mail
spring.mail.host=${SMTP_HOST:s323.xrea.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:support@h4mizoo.shop}
spring.mail.password=${SMTP_PASSWORD:163}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS:true}
spring.mail.default-encoding=UTF-8

# Mail sender / contact destination
mail.from-email=${MAIL_FROM_EMAIL:${SENDGRID_FROM_EMAIL:support@h4mizoo.shop}}
mail.from-name=${MAIL_FROM_NAME:PetLife Plus}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:support@h4mizoo.shop}
sendgrid.from-name=PetLife Plus
contact.to-email=${CONTACT_TO_EMAIL:${SENDGRID_FROM_EMAIL:support@h4mizoo.shop}}

# Local app URL
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Keep local rate limit adjustable without touching the shared config.
password-reset.rate-limit-minutes=${PASSWORD_RESET_RATE_LIMIT_MINUTES:15}
